name: Build Lexy

on:
  push:
    branches: [main, clean-main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka

      - name: Verify imports
        shell: cmd
        run: python -c "import os,sys; os.environ['GROQ_API_KEY']='test'; os.environ['TELEGRAM_BOT_TOKEN']='test'; import lexy_tray; print('Imports OK')"

      - name: Build with Nuitka
        shell: cmd
        run: |
          python -m nuitka --standalone --mingw64 ^
            --assume-yes-for-downloads ^
            --windows-console-mode=disable ^
            --lto=no --jobs=1 ^
            --show-scons --show-progress ^
            --output-dir=dist --remove-output ^
            --nofollow-import-to=pymupdf ^
            --include-data-dir=frontends/templates=templates ^
            --include-data-dir=frontends/static=static ^
            --include-data-dir=whatsapp-bridge=whatsapp-bridge ^
            --include-data-files=.env.example=.env.example ^
            lexy_tray.py

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: Lexy-Portable
          path: dist/lexy_tray.dist/

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Lexy-Portable

      - name: Create ZIP
        run: zip -r Lexy-v${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Lexy-v${{ github.ref_name }}.zip
          generate_release_notes: true
